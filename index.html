<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Unicorn – Registro de Servicios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">
    <style>
        :root { --neon-pink: #ff71ce; --neon-blue: #00f3ff; --dark-bg: #050505; }
        body { font-family: 'Pangolin', cursive; background: var(--dark-bg); color: var(--neon-pink); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-neon { display: block; margin: 10px auto; width: 140px; filter: drop-shadow(0 0 15px rgba(255, 113, 206, 0.9)); }
        h1 { text-align: center; font-size: 32px; color: #fff; text-shadow: 0 0 10px var(--neon-pink); margin-top: 0; }
        
        .container, .historial-container { 
            background: rgba(20, 20, 20, 0.9); 
            border: 2px solid var(--neon-pink); 
            border-radius: 25px; 
            padding: 20px; 
            box-shadow: 0 0 20px rgba(255, 113, 206, 0.2); 
            width: 95%; 
            max-width: 500px; 
            margin-bottom: 20px; 
        }

        label { display: block; margin-bottom: 8px; color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        select, input[type="number"] { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--neon-pink); 
            background: #1a1a1a; color: #fff; font-family: 'Pangolin'; font-size: 17px; 
            margin-bottom: 15px; outline: none; box-sizing: border-box;
        }

        .seccion-servicio {
            background: rgba(255, 113, 206, 0.1);
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed var(--neon-blue);
            margin-bottom: 15px;
        }

        .btn-add { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); margin-bottom: 10px; }
        .btn-registrar { background: var(--neon-pink); color: #000; border: none; font-weight: bold; }
        
        button { 
            width: 100%; padding: 12px; border-radius: 12px; font-family: 'Pangolin'; 
            font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 5px;
        }
        button:active { transform: scale(0.98); }

        .lista-temporal { list-style: none; padding: 0; margin: 10px 0; border-top: 1px solid #333; }
        .temp-item { font-size: 15px; color: #00f3ff; display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .total-monto { font-size: 45px; color: #fff; text-shadow: 0 0 10px var(--neon-blue); display: block; text-align: center; margin: 15px 0; }

        #listaPagos { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; }
        .pago-item { 
            background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 8px; 
            margin-bottom: 10px; border-left: 4px solid var(--neon-blue); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        small { color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <img src="VU_LOGO_OFFICIAL.png" class="logo-neon" alt="Vanilla Unicorn">
    <h1>Vanilla Unicorn</h1>

    <div class="container">
        <label>1. Seleccionar Empleada</label>
        <select id="empleada">
            <option value="">-- Nombre --</option>
            <option>Anya</option><option>Ashanti</option><option>Cleo</option>
            <option>Jade</option><option>Lilith</option><option>Maddy</option>
            <option>Mei</option><option>Raven</option><option>Sadie</option>
            <option>Saher</option><option>Sheila</option><option>Valentina</option>
        </select>

        <div class="seccion-servicio">
            <label>2. Servicio y Precio Pactado</label>
            <select id="servicio" onchange="sugerirPrecio()">
                <option value="">-- Seleccionar Servicio --</option>
                <option value="Barra" data-precio="0">Barra</option>
                <option value="Escenario" data-precio="5000">Escenario</option>
                <option value="Baile Privado" data-precio="25000">Baile Privado</option>
                <option value="Servicio Completo Exclusivo" data-precio="60000">Servicio Completo Exclusivo</option>
                <option value="Otro" data-precio="0">Otro / Extra</option>
            </select>
            <input type="number" id="precioManual" placeholder="Monto pactado $">
            <button class="btn-add" onclick="agregarAListaTemporal()">+ AÑADIR A LA CUENTA</button>
        </div>

        <ul id="listaTemporal" class="lista-temporal"></ul>
        
        <span class="total-monto" id="montoTotal">$0</span>
        <button class="btn-registrar" onclick="registrarFinal()">REGISTRAR SERVICIOS Y LIMPIAR</button>
    </div>

    <div class="historial-container">
        <h2 style="color: var(--neon-blue); text-align: center; margin-top: 0;">Historial del Turno</h2>
        <ul id="listaPagos"></ul>
        <button style="background: transparent; border: 1px solid #444; color: #888;" onclick="descargarReporte()">DESCARGAR REPORTE FINAL</button>
    </div>

    <script>
        let serviciosTurnoActual = [];
        let registrosGlobal = [];
        let totalAcumulado = 0;

        function sugerirPrecio() {
            const select = document.getElementById('servicio');
            const precioSugerido = select.options[select.selectedIndex].getAttribute('data-precio');
            if (precioSugerido !== null) {
                document.getElementById('precioManual').value = precioSugerido;
            }
        }

        function agregarAListaTemporal() {
            const serv = document.getElementById('servicio').value;
            const montoInput = document.getElementById('precioManual').value;
            const monto = parseInt(montoInput);

            if (!serv || isNaN(monto)) {
                return alert("Por favor, selecciona un servicio e ingresa el precio.");
            }

            serviciosTurnoActual.push({ servicio: serv, monto: monto });
            totalAcumulado += monto;
            
            actualizarUI();
            
            // Resetear solo la parte del servicio
            document.getElementById('servicio').selectedIndex = 0;
            document.getElementById('precioManual').value = "";
        }

        function actualizarUI() {
            const lista = document.getElementById('listaTemporal');
            lista.innerHTML = "";
            serviciosTurnoActual.forEach(s => {
                lista.innerHTML += `<li class="temp-item"><span>${s.servicio}</span> <span>$${s.monto}</span></li>`;
            });
            document.getElementById('montoTotal').innerText = `$${totalAcumulado}`;
        }

        function registrarFinal() {
            const nombre = document.getElementById('empleada').value;
            if (!nombre) return alert("Primero selecciona a la empleada.");
            if (serviciosTurnoActual.length === 0) return alert("No has añadido ningún servicio aún.");

            const nombresServicios = serviciosTurnoActual.map(s => s.servicio).join(" + ");
            const hora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            registrosGlobal.push({
                nombre: nombre,
                servicios: nombresServicios,
                monto: totalAcumulado,
                hora: hora
            });

            // Limpieza total
            serviciosTurnoActual = [];
            totalAcumulado = 0;
            document.getElementById('empleada').selectedIndex = 0;
            document.getElementById('listaTemporal').innerHTML = "";
            document.getElementById('montoTotal').innerText = "$0";
            
            actualizarListaHistorial();
        }

        function actualizarListaHistorial() {
            const lista = document.getElementById('listaPagos');
            lista.innerHTML = "";
            // Mostramos los más recientes primero
            registrosGlobal.slice().reverse().forEach(r => {
                lista.innerHTML += `
                    <li class="pago-item">
                        <span><strong>${r.nombre}</strong><br><small>${r.servicios} [${r.hora}]</small></span>
                        <b style="color: #fff;">$${r.monto}</b>
                    </li>`;
            });
        }

        function descargarReporte() {
            if(registrosGlobal.length === 0) return alert("No hay datos para exportar.");
            let txt = "REPORTE VANILLA UNICORN\n========================\n\n";
            const resumen = {};
            
            registrosGlobal.forEach(r => {
                txt += `[${r.hora}] ${r.nombre} | ${r.servicios} | $${r.monto}\n`;
                resumen[r.nombre] = (resumen[r.nombre] || 0) + r.monto;
            });
            
            txt += "\nTOTAL ACUMULADO POR EMPLEADA:\n========================\n";
            for(let n in resumen) {
                txt += `${n}: $${resumen[n]}\n`;
            }
            
            const blob = new Blob([txt], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "Reporte_V_Unicorn.txt";
            a.click();
        }
    </script>
</body>
</html>
