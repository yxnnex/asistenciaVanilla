<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Unicorn – Registro de Asistencia</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-pink: #ff71ce;
            --neon-blue: #00f3ff;
            --neon-purple: #b967ff;
            --dark-bg: #050505;
        }

        body { 
            font-family: 'Pangolin', cursive; 
            background: var(--dark-bg); 
            color: var(--neon-pink); 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            text-align: center; 
            font-size: 38px; 
            color: #fff; 
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            margin-bottom: 20px;
        }

        .container {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid var(--neon-pink);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(255, 113, 206, 0.2);
            width: 95%;
            max-width: 550px;
            margin-bottom: 30px;
        }

        label { display: block; margin-bottom: 10px; font-size: 18px; color: #fff; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--neon-pink);
            background: #1a1a1a;
            color: #fff;
            font-family: 'Pangolin', cursive;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
        }

        .opciones-pago {
            background: rgba(255, 113, 206, 0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed var(--neon-pink);
            margin-bottom: 20px;
        }

        .check-container {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 17px;
            color: #ddd;
            cursor: pointer;
        }

        .check-container input { margin-right: 12px; width: 20px; height: 20px; accent-color: var(--neon-pink); }

        .total-box { text-align: center; border-top: 1px solid var(--neon-pink); padding-top: 15px; }
        .total-monto { font-size: 45px; color: #fff; text-shadow: 0 0 10px var(--neon-blue); display: block; margin-bottom: 15px; }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-family: 'Pangolin', cursive;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-registrar { background: var(--neon-pink); color: #000; border: none; box-shadow: 0 0 10px var(--neon-pink); }
        .btn-registrar:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-pink); }

        /* SECCIÓN HISTORIAL */
        .historial-container {
            width: 95%;
            max-width: 550px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        h2 { font-size: 22px; color: var(--neon-blue); text-align: center; text-transform: uppercase; margin-top: 0; }

        #listaPagos {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .pago-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 15px;
            border-left: 4px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-descargar {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 16px;
            margin-top: 15px;
        }

        .btn-descargar:hover { background: var(--neon-blue); color: #000; }
        
        .precio-tag { margin-left: auto; color: var(--neon-blue); font-size: 14px; }
    </style>
</head>
<body>

    <img src="VU_LOGO_OFFICIAL.png" style="width: 120px; margin-bottom: 10px;" alt="VU Logo">
    <h1>Vanilla Unicorn <br> <span style="font-size: 18px; color: var(--neon-blue);">Gestión de Asistencia</span></h1>

    <div class="container">
        <label>Seleccionar Empleada</label>
        <select id="empleada">
            <option value="">-- Nombre Apellido --</option>
            <option>Anya</option><option>Ashanti</option><option>Clep</option>
            <option>Mei</option><option>Jade</option><option>Raven</option>
            <option>Sadie</option><option>Saher</option><option>Sheila</option>
            <option>Valentina</option>
        </select>

        <div class="opciones-pago">
            <label class="check-container"><input type="checkbox" id="barra" value="0"> Barra <span class="precio-tag">$0</span></label>
            <label class="check-container"><input type="checkbox" id="baileEscenario" class="costo"> Baile Escenario <span id="pEscenario" class="precio-tag"></span></label>
            <label class="check-container"><input type="checkbox" id="bailePrivado" class="costo"> Baile Privado (Solo baile) <span id="pPrivadoSolo" class="precio-tag"></span></label>
            <label class="check-container"><input type="checkbox" id="privadoCompleto" class="costo"> Privado (Completo) <span id="pCompleto" class="precio-tag"></span></label>
        </div>

        <div class="total-box">
            <span style="color: #bbb; font-size: 14px;">TOTAL A PAGAR</span>
            <span class="total-monto" id="montoTotal">$0</span>
            <button class="btn-registrar" onclick="registrarPago()">REGISTRAR Y LIMPIAR</button>
        </div>
    </div>

    <div class="historial-container">
        <h2>Historial de Pagos</h2>
        <ul id="listaPagos">
            </ul>
        <button class="btn-descargar" onclick="descargarReporte()">DESCARGAR REPORTE .TXT</button>
    </div>

    <script>
        // --- CONFIGURA LOS MONTOS AQUÍ ---
        const PRECIOS = {
            escenario: 0,       // Baile escenario
            privadoSolo: 0,     // Baile privado solo
            completo: 0         // Privado completo
        };

        // Mostrar precios en la interfaz
        document.getElementById('pEscenario').innerText = `$${PRECIOS.escenario}`;
        document.getElementById('pPrivadoSolo').innerText = `$${PRECIOS.privadoSolo}`;
        document.getElementById('pCompleto').innerText = `$${PRECIOS.completo}`;

        // Lógica de actualización de precio en tiempo real
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                let total = 0;
                if(document.getElementById('baileEscenario').checked) total += PRECIOS.escenario;
                if(document.getElementById('bailePrivado').checked) total += PRECIOS.privadoSolo;
                if(document.getElementById('privadoCompleto').checked) total += PRECIOS.completo;
                document.getElementById('montoTotal').innerText = `$${total}`;
            });
        });

        let registrosGlobal = [];

        function registrarPago() {
            const nombre = document.getElementById('empleada').value;
            if(!nombre) { alert("Elige una empleada primero."); return; }

            let acts = [];
            let total = 0;

            if(document.getElementById('barra').checked) acts.push("Barra");
            if(document.getElementById('baileEscenario').checked) { acts.push("Escenario"); total += PRECIOS.escenario; }
            if(document.getElementById('bailePrivado').checked) { acts.push("B. Privado"); total += PRECIOS.privadoSolo; }
            if(document.getElementById('privadoCompleto').checked) { acts.push("P. Completo"); total += PRECIOS.completo; }

            if(acts.length === 0) { alert("Selecciona al menos una actividad."); return; }

            const registro = {
                nombre: nombre,
                servicios: acts.join(" + "),
                monto: total,
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            registrosGlobal.push(registro);
            actualizarLista();
            resetForm();
        }

        function actualizarLista() {
            const lista = document.getElementById('listaPagos');
            lista.innerHTML = "";
            registrosGlobal.slice().reverse().forEach(r => {
                lista.innerHTML += `
                    <li class="pago-item">
                        <span><strong>${r.nombre}</strong><br><small style="color:#888">${r.servicios}</small></span>
                        <span style="color:var(--neon-blue); font-weight:bold;">$${r.monto}</span>
                    </li>
                `;
            });
        }

        function resetForm() {
            document.getElementById('empleada').selectedIndex = 0;
            checkboxes.forEach(cb => cb.checked = false);
            document.getElementById('montoTotal').innerText = "$0";
        }

        function descargarReporte() {
            if(registrosGlobal.length === 0) return;
            let txt = "VANILLA UNICORN - REPORTE DE ASISTENCIA\n";
            txt += "========================================\n\n";
            let suma = 0;
            registrosGlobal.forEach(r => {
                txt += `[${r.hora}] ${r.nombre} | ${r.servicios} | Pago: $${r.monto}\n`;
                suma += r.monto;
            });
            txt += `\n========================================\n`;
            txt += `TOTAL GENERAL A PAGAR: $${suma}`;

            const blob = new Blob([txt], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Reporte_VU_${new Date().toLocaleDateString().replace(/\//g, '-')}.txt`;
            a.click();
        }
    </script>
</body>
</html>
